<!DOCTYPE html>
<html lang="ja">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Wanderlust - Travel Itinerary</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link
        href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=Outfit:wght@400;500;600;700&display=swap"
        rel="stylesheet">
    <link rel="stylesheet" href="style.css">
    <!-- Ionicons for beautiful icons -->
    <script type="module" src="https://unpkg.com/ionicons@7.1.0/dist/ionicons/ionicons.esm.js"></script>
    <script nomodule src="https://unpkg.com/ionicons@7.1.0/dist/ionicons/ionicons.js"></script>
</head>

<body>
    <div class="app-container">
        <!-- Sidebar Navigation (Desktop) / Bottom Nav (Mobile) -->
        <nav class="sidebar">
            <div class="logo">
                <ion-icon name="airplane-outline"></ion-icon>
                <span>Wanderlust</span>
            </div>
            <ul class="nav-links">
                <li class="active" data-view="dashboard">
                    <ion-icon name="grid-outline"></ion-icon>
                    <span>Trips</span>
                </li>
                <li data-view="explore(disabled)" class="disabled">
                    <ion-icon name="compass-outline"></ion-icon>
                    <span>Explore</span>
                </li>
                <li data-view="settings">
                    <ion-icon name="settings-outline"></ion-icon>
                    <span>Settings</span>
                </li>
            </ul>
        </nav>

        <!-- Main Content Area -->
        <main class="main-content">

            <!-- Dashboard View: List of Trips -->
            <section id="dashboard-view" class="view active">
                <header class="view-header">
                    <div>
                        <h1>Your Trips</h1>
                        <p class="subtitle">Plan your next adventure.</p>
                    </div>
                    <div class="header-controls">
                        <input type="file" id="import-csv-file" accept=".csv" style="display: none;">
                        <button id="btn-import-csv" class="btn-secondary" title="Import Trips from CSV">
                            <ion-icon name="cloud-upload-outline"></ion-icon>
                        </button>
                        <button id="btn-export-csv" class="btn-secondary" title="Export Trips to CSV">
                            <ion-icon name="cloud-download-outline"></ion-icon>
                        </button>
                        <select id="sort-trips" class="sort-select">
                            <option value="date-desc">Date (Latest First)</option>
                            <option value="date-asc">Date (Earliest First)</option>
                            <option value="name-asc">Name (A-Z)</option>
                            <option value="name-desc">Name (Z-A)</option>
                        </select>
                        <button id="btn-new-trip" class="btn-primary">
                            <ion-icon name="add-outline"></ion-icon>
                            New Trip
                        </button>
                    </div>
                </header>

                <div class="trips-grid" id="trips-container">
                    <!-- Trip cards will be injected here via JS -->
                    <!-- Empty State -->
                    <div class="empty-state" id="trips-empty-state">
                        <div class="empty-icon">
                            <ion-icon name="map-outline"></ion-icon>
                        </div>
                        <h3>No trips planned yet</h3>
                        <p>Start by creating your first itinerary!</p>
                        <p style="margin-top:0.5rem;font-size:0.9rem;">Click "New Trip" to begin.</p>
                    </div>
                </div>
            </section>

            <!-- Settings View -->
            <section id="settings-view" class="view hidden">
                <header class="view-header">
                    <div>
                        <h1>Settings</h1>
                        <p class="subtitle">Customize your experience.</p>
                    </div>
                </header>

                <div class="settings-container">
                    <div class="setting-item">
                        <label>App Theme Color</label>
                        <div class="color-picker-container" id="theme-color-picker">
                            <!-- Colors generated by JS -->
                        </div>
                    </div>
                </div>
            </section>

            <!-- Trip Details View: Itinerary -->
            <section id="trip-detail-view" class="view hidden">
                <header class="view-header with-back">
                    <button id="btn-back-to-dashboard" class="btn-icon" aria-label="Back to Dashboard">
                        <ion-icon name="arrow-back-outline"></ion-icon>
                    </button>
                    <div class="trip-header-info">
                        <h1 id="detail-trip-title">Trip to Paris</h1>
                        <p id="detail-trip-dates" class="subtitle">Oct 12 - Oct 18, 2024</p>
                        <div id="trip-total-cost" class="trip-cost-badge">Total: ¥0</div>
                    </div>
                    <div class="header-actions">
                        <button id="btn-edit-trip" class="btn-secondary" aria-label="Edit Trip">
                            <ion-icon name="create-outline"></ion-icon>
                        </button>
                        <button id="btn-delete-trip" class="btn-danger-ghost" aria-label="Delete Trip">
                            <ion-icon name="trash-outline"></ion-icon>
                        </button>
                    </div>
                </header>

                <div class="itinerary-content">
                    <!-- Days Navigation (Ancor links) -->
                    <div class="days-nav-sticky" id="days-nav">
                        <!-- Quick links to days -->
                    </div>

                    <!-- Timeline (All days vertical) -->
                    <div class="vertical-itinerary" id="itinerary-container">
                        <!-- All days injected here -->
                    </div>
                </div>

            </section>
        </main>
    </div>

    <button id="btn-add-activity" class="btn-primary hidden">
        <ion-icon name="add-outline"></ion-icon>
        Add Activity
    </button>

    <!-- Modals -->
    <div id="modal-overlay" class="modal-overlay hidden">

        <!-- Create Trip Modal -->
        <div id="modal-create-trip" class="modal hidden">
            <div class="modal-header">
                <h2>Create New Trip</h2>
                <button class="btn-close-modal" aria-label="Close Modal"><ion-icon
                        name="close-outline"></ion-icon></button>
            </div>
            <form id="form-create-trip">
                <input type="hidden" id="trip-id">
                <div class="form-group">
                    <label for="trip-destination">Destination</label>
                    <input type="text" id="trip-destination" placeholder="e.g., Tokyo, Japan" required>
                </div>
                <div class="form-group">
                    <label for="trip-currency">Currency</label>
                    <select id="trip-currency">
                        <option value="JPY">Japanese Yen (¥)</option>
                        <option value="USD">US Dollar ($)</option>
                        <option value="EUR">Euro (€)</option>
                        <option value="GBP">British Pound (£)</option>
                        <option value="KRW">Korean Won (₩)</option>
                    </select>
                </div>
                <!-- Simplified for MVP: Start Date only, duration calculated or just open ended -->
                <div class="form-row">
                    <div class="form-group">
                        <label for="trip-start-date">Start Date</label>
                        <input type="date" id="trip-start-date" required>
                    </div>
                    <div class="form-group">
                        <label for="trip-end-date">End Date</label>
                        <input type="date" id="trip-end-date" required>
                    </div>
                </div>
                <div class="form-group">
                    <label for="trip-image-url">Cover Image URL (Optional)</label>
                    <input type="url" id="trip-image-url" placeholder="https://source.unsplash.com/...">
                </div>
                <div class="modal-footer">
                    <button type="button" class="btn-secondary btn-close-modal">Cancel</button>
                    <button type="submit" class="btn-primary">Create Trip</button>
                </div>
            </form>
        </div>

        <!-- Add Activity Modal -->
        <div id="modal-add-activity" class="modal hidden">
            <div class="modal-header">
                <h2>Add Activity</h2>
                <button class="btn-close-modal" aria-label="Close Modal"><ion-icon
                        name="close-outline"></ion-icon></button>
            </div>
            <form id="form-add-activity">
                <input type="hidden" id="activity-trip-id">
                <div class="form-group">
                    <label for="activity-day-select">Day</label>
                    <select id="activity-day-select" required>
                        <!-- Options populated dynamically -->
                    </select>
                </div>
                <div class="form-row">
                    <div class="form-group">
                        <label for="activity-time">Start Time</label>
                        <input type="time" id="activity-time" required>
                    </div>
                    <div class="form-group">
                        <label for="activity-end-time">Finish Time</label>
                        <input type="time" id="activity-end-time">
                    </div>

                </div>
                <div class="form-group">
                    <label for="activity-title">Title</label>
                    <input type="text" id="activity-title" placeholder="e.g., Dinner at SkyTree" required>
                </div>
                <div class="form-row">
                    <div class="form-group">
                        <label for="activity-cost">Cost (Optional)</label>
                        <input type="text" id="activity-cost" placeholder="e.g., 5000 or 1000+500">
                    </div>
                </div>
                <div class="form-group">
                    <label for="activity-notes">Notes</label>
                    <textarea id="activity-notes" rows="3" placeholder="Reservation ID, cost, etc."></textarea>
                </div>
                <div class="modal-footer">
                    <button type="button" class="btn-secondary btn-close-modal">Cancel</button>
                    <button type="submit" class="btn-primary">Add Activity</button>
                </div>
            </form>
        </div>
    </div>

    <script src="script.js"></script>
</body>

</html>
